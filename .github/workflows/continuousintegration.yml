name: Java CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compilar aplicação
        run: javac main.java Calculos.java

      - name: Baixar Checkstyle
        run: wget https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.17.0/checkstyle-10.17.0-all.jar

      - name: Rodar Checkstyle
        run: java -jar checkstyle-10.17.0-all.jar -c /google_checks.xml *.java

  testes:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Baixar JUnit
        run: wget https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

      - name: Compilar testes
        run: javac -cp .:junit-platform-console-standalone-1.10.2.jar *.java

      - name: Rodar testes
        run: java -jar junit-platform-console-standalone-1.10.2.jar --class-path . --scan-class-path

  buildx:
    needs: testes
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

  discord:
    runs-on: ubuntu-latest
    needs: [ build, testes, buildx ]
    if: success()

    steps:
      - name: Enviar mensagem bonita para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "embeds": [{
              "title": "🚀 Pipeline Executado com Suceso",
              "color": 5763719,
              "fields": [
                {
                  "name": "📦 Repositório",
                  "value": "${{ github.repository }}",
                  "inline": true
                },
                {
                  "name": "🌿 Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "👤 Autor",
                  "value": "${{ github.actor }}",
                  "inline": true
                },
                {
                  "name": "📝 Commit",
                  "value": "${{ github.event.head_commit.message }}",
                  "inline": false
                }
              ],
              "footer": {
                "text": "GitHub Actions • Java CI"
              },
              "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}