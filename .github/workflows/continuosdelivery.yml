name: Continuos delivery java
on:
  push:
    branches:
      - main # ou qualquer outra branch

jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4


      - name: Simulando continuos delivery
        uses: actions/upload-artifact@v4
        with:
          name: meu codigo .zip
          path:
            main.java
            README.md

  deploy:
    runs-on: ubuntu-latest
    needs: dalivery
    steps:
      - uses: actions/downsload-artifact@v4
        with:
          name: projetozipado.zip
      - name: Display structure of downloadded files
        run: ls -R

